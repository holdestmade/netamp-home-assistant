set_raw_command:
  name: Send raw NetAmp command
  description: Send a raw TCP command (without CRLF) to the NetAmp. Intended for debugging.
  fields:
    entry_id:
      name: Config entry id
      description: The config entry id of the NetAmp instance.
      required: true
      selector:
        text:
    command:
      name: Command
      description: "Example: $g1gpv or $s1vol10"
      required: true
      selector:
        text:

set_bass:
  name: Set Bass
  description: Set the bass level for a specific zone or all zones.
  fields:
    entry_id:
      name: Config entry id
      description: The config entry id of the NetAmp instance.
      required: true
      selector:
        text:
    zone:
      name: Zone
      description: Zone number (1 or 2). Use "X" for all zones.
      required: true
      default: "1"
      selector:
        select:
          options:
            - "1"
            - "2"
            - "X"
    level:
      name: Level
      description: Bass level from -7 to 7.
      required: true
      selector:
        number:
          min: -7
          max: 7
          step: 1

